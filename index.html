<<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cocar Sagrado</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Raleway:wght@400&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Raleway', sans-serif; 
            background: url('fundo.jpg') center/cover fixed no-repeat #0a1a0a; 
            color: #ffffff; 
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header { 
            background-color: rgba(13, 54, 16, 0.9); 
            padding: 2rem 1rem; 
            text-align: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        h1 { font-family: 'Cinzel', serif; font-size: 1.8rem; letter-spacing: 2px; color: #ffd700; }
        .subtitle { font-size: 0.9rem; color: #c8e6c9; margin-top: 0.5rem; }
        
        .nav-bar { display: flex; justify-content: center; gap: 10px; margin-top: 1.5rem; flex-wrap: wrap; }
        .nav-bar button { 
            background: #1b5e20; border: 1px solid #ffd700; color: #ffd700;
            padding: 8px 16px; border-radius: 4px; cursor: pointer;
            font-family: 'Cinzel', serif; font-size: 0.8rem; transition: 0.3s;
        }
        .nav-bar button:hover { background: #ffd700; color: #0d3610; }

        section { display: none; padding: 2rem 1rem; max-width: 600px; margin: 0 auto; width: 100%; }
        section.active { display: block; }
        
        h2 { 
            font-family: 'Cinzel', serif; 
            color: #ffd700; 
            text-align: center; 
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            margin-bottom: 1.5rem;
        }

        .description-box { 
            background-color: #0d3610; 
            padding: 2rem; 
            border-radius: 8px; 
            border-left: 4px solid #ffd700;
            margin-bottom: 1.5rem;
        }

        /* --- ESTILO DA VITRINE INTERATIVA --- */
        .vitrine-container {
            text-decoration: none;
            display: block;
            margin: 0 auto;
            width: 100%;
            max-width: 450px;
            transition: transform 0.3s ease;
        }

        .vitrine-container:hover {
            transform: scale(1.02);
        }

        .fachada-loja {
            background-color: #061a07;
            border: 8px solid #041005;
            border-radius: 10px 10px 0 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .letreiro {
            background-color: #041005;
            padding: 15px;
            text-align: center;
            border-bottom: 3px solid #ffd700;
        }

        .letreiro h3 {
            font-family: 'Cinzel', serif;
            color: #ffd700;
            font-size: 1.5rem;
            letter-spacing: 5px;
            margin: 0;
        }

        .vidro-vitrine {
            background: rgba(255, 255, 255, 0.05);
            margin: 20px;
            padding: 15px;
            border: 4px solid #0d3610;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .produto-mini {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border: 1px solid #ffd700;
        }

        .base-loja {
            height: 20px;
            background: #041005;
        }

        .instrucao-clique {
            text-align: center;
            color: #c8e6c9;
            font-size: 0.8rem;
            margin-top: 15px;
            font-style: italic;
        }

        .socials { display: flex; flex-direction: column; gap: 10px; }
        .socials a { 
            display: block; text-align: center; padding: 1rem; 
            background: #1b5e20; color: #fff; text-decoration: none; 
            border-radius: 4px; font-family: 'Cinzel', serif;
        }

        footer { text-align: center; padding: 2rem; font-size: 0.8rem; color: #ccc; margin-top: auto; }
        .img-externa { display: block; width: 100%; max-width: 250px; margin: 0 auto 1.5rem; border-radius: 8px; }
    </style>
</head>
<body>

    <header>
        <h1>Cocar Sagrado</h1>
        <div class="subtitle">Camila e Matheus</div>
        <div class="nav-bar">
            <button onclick="showSection('copa1')">Sobre</button>
            <button onclick="showSection('copa2')">Catálogo</button>
            <button onclick="showSection('copa3')">Contato</button>
        </div>
    </header>

    <section id="copa1" class="active">
        <h2>Sobre</h2>
        <div class="description-box">
            O Cocar Sagrado é uma iniciativa que visa entregar atendimento fluido e humanizado...
        </div>
        <img src="caboclo.jpg" class="img-externa" alt="Cocar">
    </section>

    <section id="copa2">
        <h2>Catálogo</h2>
        
        <a href="atendimento.html" class="vitrine-container">
            <div class="fachada-loja">
                <div class="letreiro">
                    <h3>CATÁLOGO</h3>
                </div>
                
                <div class="vidro-vitrine">
                    <img src="cocar1.jpg" class="produto-mini">
                    <img src="cocar2.jpg" class="produto-mini">
                    <img src="cocar3.jpg" class="produto-mini">
                    <img src="cocar4.jpg" class="produto-mini">
                    <img src="cocar5.jpg" class="produto-mini">
                    <img src="cocar6.jpg" class="produto-mini">
                    <img src="cocar7.jpg" class="produto-mini">
                    <img src="cocar8.jpg" class="produto-mini">
                    <img src="cocar9.jpg" class="produto-mini">
                    <img src="cocar10.jpg" class="produto-mini">
                    <img src="cocar11.jpg" class="produto-mini">
                    <img src="cocar12.jpg" class="produto-mini">
                    <img src="cocar13.jpg" class="produto-mini">
                    <img src="cocar14.jpg" class="produto-mini">
                </div>
                
                <div class="base-loja"></div>
            </div>
            <p class="instrucao-clique">Toque na vitrine para escolher seu atendimento</p>
        </a>
    </section>

    <section id="copa3">
        <h2>Contato</h2>
        <div class="socials">
            <a href="https://wa.me//5527998528483" target="_blank">WhatsApp</a>
        </div>
    </section>

    <footer>© 2026 Cocar Sagrado</footer>

    <script>
        function showSection(id){
            document.querySelectorAll("section").forEach(sec => sec.classList.remove("active"));
            document.getElementById(id).classList.add("active");
        }
    </script>
</body>
</html>
