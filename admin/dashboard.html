<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Admin — Cocar Sagrado</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/agendamento-styles.css">
  <link rel="stylesheet" href="css/dashboard.css?v=6">
</head>
<body>

<div class="adm-layout">

  <!-- Sidebar -->
  <aside class="adm-sidebar">
    <div>
      <h2>Cocar Sagrado</h2>
      <p>Painel Administrativo</p>
    </div>
    <nav class="adm-nav" aria-label="Menu admin">
      <a href="#" class="active" id="nav-agendamentos">✦ Agendamentos</a>
      <a href="#" id="nav-vagas">✦ Vagas</a>
      <a href="#" id="nav-especial">✦ Agenda Especial</a>
      <a href="#" id="nav-descontos">✦ Descontos</a>
      <a href="../index.html" target="_blank">✦ Ver site</a>
    </nav>
    <div style="margin-top:auto;">
      v1.2.0
    </div>
  </aside>

  <!-- Main -->
  <main class="adm-main">

    <!-- ===== SEÇÃO: AGENDAMENTOS ===== -->
    <div id="secao-agendamentos">
      <header class="adm-main-header">
        <h1>Agendamentos</h1>
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
          <button class="ag-btn ag-btn-outline ag-btn-sm" id="btn-atualizar">🔄 Atualizar</button>
          <button class="ag-btn ag-btn-copy ag-btn-sm" id="btn-exportar">⬇ Exportar CSV</button>
        </div>
      </header>

      <div class="adm-stats" role="region" aria-label="Estatísticas">
        <div class="adm-stat-card hoje">
          <div class="adm-stat-label">Agendamentos hoje</div>
          <div class="adm-stat-value" id="stat-hoje">—</div>
        </div>
        <div class="adm-stat-card pendente">
          <div class="adm-stat-label">Pendentes</div>
          <div class="adm-stat-value" id="stat-pendente">—</div>
        </div>
        <div class="adm-stat-card pagos">
          <div class="adm-stat-label">Pagos / Confirmados</div>
          <div class="adm-stat-value" id="stat-pagos">—</div>
        </div>
        <div class="adm-stat-card total">
          <div class="adm-stat-label">Faturado no mês</div>
          <div class="adm-stat-value" id="stat-total">—</div>
        </div>
      </div>

      <div class="adm-status-pills" role="group" aria-label="Filtro por status">
        <button class="adm-pill adm-pill-pendente active" data-status="pendente" onclick="filtrarPorPill('pendente')">
          Pendente <span class="adm-pill-count" id="pill-count-pendente">—</span>
        </button>
        <button class="adm-pill adm-pill-pago" data-status="pago" onclick="filtrarPorPill('pago')">
          Pago <span class="adm-pill-count" id="pill-count-pago">—</span>
        </button>
        <button class="adm-pill adm-pill-atendido" data-status="atendido" onclick="filtrarPorPill('atendido')">
          Atendido <span class="adm-pill-count" id="pill-count-atendido">—</span>
        </button>
        <button class="adm-pill adm-pill-cancelado" data-status="cancelado" onclick="filtrarPorPill('cancelado')">
          Cancelado <span class="adm-pill-count" id="pill-count-cancelado">—</span>
        </button>
      </div>

      <div class="adm-filters" role="search" aria-label="Filtros">
        <div class="ag-form-group" style="margin:0">
          <label for="filtro-data" style="font-size:.75rem">Data</label>
          <input type="date" id="filtro-data">
        </div>
        <div class="ag-form-group" style="margin:0">
          <label for="filtro-terapeuta" style="font-size:.75rem">Terapeuta</label>
          <select id="filtro-terapeuta">
            <option value="">Todos</option>
            <option value="matheus">Matheus</option>
            <option value="camila">Camila</option>
          </select>
        </div>
        <div class="ag-form-group" style="margin:0">
          <label for="filtro-metodo" style="font-size:.75rem">Método pag.</label>
          <select id="filtro-metodo">
            <option value="">Todos</option>
            <option value="pix">PIX</option>
            <option value="cartao">Cartão</option>
            <option value="wise">Wise</option>
            <option value="__null">Não registrado</option>
          </select>
        </div>
      </div>

      <div id="lista-agendamentos" class="adm-list" role="list" aria-label="Lista de agendamentos">
        <div class="ag-loading"><div class="ag-spinner"></div> Carregando...</div>
      </div>
    </div>

    <!-- ===== SEÇÃO: VAGAS ===== -->
    <div id="secao-vagas" style="display:none">
      <header class="adm-main-header">
        <h1>Vagas</h1>
      </header>

      <div id="vagas-padrao-container">
        <div class="ag-loading"><div class="ag-spinner"></div> Carregando...</div>
      </div>
    </div>

    <!-- ===== SEÇÃO: AGENDA ESPECIAL ===== -->
    <div id="secao-especial" style="display:none">
      <header class="adm-main-header">
        <h1>Agenda Especial</h1>
      </header>

      <div style="display:flex; gap:8px; margin-bottom:12px;">
        <button class="ag-btn ag-btn-outline ag-btn-sm active" id="btn-esp-matheus" onclick="trocarProfEspecial('matheus')">Matheus</button>
        <button class="ag-btn ag-btn-outline ag-btn-sm" id="btn-esp-camila" onclick="trocarProfEspecial('camila')">Camila</button>
      </div>

      <p style="font-size:.82rem; color:var(--text-muted,#888); margin-bottom:20px;">
        Serviços: <strong id="esp-servicos-info"></strong>
      </p>

      <div class="esp-add-form">
        <div class="ag-form-group" style="margin:0">
          <label style="font-size:.75rem">Data</label>
          <input type="date" id="esp-nova-data">
        </div>
        <div class="ag-form-group" style="margin:0">
          <label style="font-size:.75rem">Vagas</label>
          <select id="esp-nova-vagas">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
          </select>
        </div>
        <div class="ag-form-group" style="margin:0">
          <label style="font-size:.75rem">Até</label>
          <select id="esp-nova-hora"></select>
        </div>
        <button class="ag-btn ag-btn-primary ag-btn-sm" id="esp-btn-adicionar" onclick="adicionarDataEspecial()" style="align-self:flex-end">
          + Adicionar
        </button>
      </div>

      <div id="esp-lista" style="margin-top:20px;"></div>
    </div>

    <!-- ===== SEÇÃO: DESCONTOS ===== -->
    <div id="secao-descontos" style="display:none">
      <header class="adm-main-header">
        <h1>Descontos</h1>
      </header>
      <div id="descontos-container">
        <div class="ag-loading"><div class="ag-spinner"></div> Carregando...</div>
      </div>
    </div>

  </main>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/supabase-config.js"></script>
<script src="js/admin-system.js?v=5"></script>
<script src="js/vagas-admin.js?v=5"></script>
<script src="js/vagas-especial-admin.js?v=1"></script>
<script src="js/descontos-admin.js?v=1"></script>
<script>
  const navAgendamentos = document.getElementById('nav-agendamentos');
  const navVagas        = document.getElementById('nav-vagas');
  const navEspecial     = document.getElementById('nav-especial');
  const navDescontos    = document.getElementById('nav-descontos');
  const secAgendamentos = document.getElementById('secao-agendamentos');
  const secVagas        = document.getElementById('secao-vagas');
  const secEspecial     = document.getElementById('secao-especial');
  const secDescontos    = document.getElementById('secao-descontos');

  const _todosNavs = [navAgendamentos, navVagas, navEspecial, navDescontos];
  const _todasSecs = [secAgendamentos, secVagas, secEspecial, secDescontos];

  function _ocultarTodas() {
    _todasSecs.forEach(s => { s.style.display = 'none'; });
    _todosNavs.forEach(n => n.classList.remove('active'));
  }

  navAgendamentos.addEventListener('click', e => {
    e.preventDefault();
    _ocultarTodas();
    secAgendamentos.style.display = '';
    navAgendamentos.classList.add('active');
    carregarAgendamentos();
  });

  navVagas.addEventListener('click', e => {
    e.preventDefault();
    _ocultarTodas();
    secVagas.style.display = '';
    navVagas.classList.add('active');
    inicializarVagas();
  });

  navEspecial.addEventListener('click', e => {
    e.preventDefault();
    _ocultarTodas();
    secEspecial.style.display = '';
    navEspecial.classList.add('active');
    inicializarEspecial();
  });

  navDescontos.addEventListener('click', e => {
    e.preventDefault();
    _ocultarTodas();
    secDescontos.style.display = '';
    navDescontos.classList.add('active');
    inicializarDescontos();
  });
</script>

</body>
</html>
